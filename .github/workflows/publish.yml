# Publishes all tui-* modules to Maven Central (Sonatype) when a version tag is pushed.
#
# Required repository secrets:
#   MILL_SONATYPE_USERNAME / MILL_SONATYPE_PASSWORD — a Central Portal token pair
#   MILL_PGP_SECRET_BASE64 — base64-encoded ASCII-armored PGP secret key
#   MILL_PGP_PASSPHRASE    — its passphrase (omit if the key has none)
name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Publish to Maven Central
        env:
          MILL_SONATYPE_USERNAME: ${{ secrets.MILL_SONATYPE_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.MILL_SONATYPE_PASSWORD }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
          MILL_PGP_PASSPHRASE: ${{ secrets.MILL_PGP_PASSPHRASE }}
        run: ./mill mill.scalalib.SonatypeCentralPublishModule/
