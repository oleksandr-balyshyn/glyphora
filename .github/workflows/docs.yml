# Builds the Docusaurus guide + per-module Scaladoc API reference and deploys the
# combined site to GitHub Pages (https://<org>.github.io/glyphora/).
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/export-wiki.mjs"
      - "scripts/style-scaladoc.mjs"
      - "core/**"
      - "terminal/**"
      - "widgets/**"
      - "runtime/**"
      - "dsl/**"
      - "macros/**"
      - "build.mill"
      - "**/package.mill"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: mill-docs-${{ runner.os }}-${{ hashFiles('.mill-version', 'build.mill', '**/package.mill') }}
          restore-keys: mill-docs-${{ runner.os }}-

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      # Validates that Pages is enabled and exposes the repository's Pages URL.
      # Repository Settings → Pages → Source must be set to "GitHub Actions".
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Validate GitHub Wiki export
        run: node scripts/export-wiki.mjs --output build/wiki

      - name: Build Docusaurus site
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Generate Scaladoc for every published module
        run: |
          set -euo pipefail
          for m in core terminal widgets runtime dsl macros; do
            jar=$(./mill show "${m}.docJar" | tail -1 | sed -E 's/^"ref:v0:[^:]+:(.*)"$/\1/')
            mkdir -p "website/build/api/${m}"
            unzip -oq "$jar" -d "website/build/api/${m}"
          done

      - name: Apply glyphora style to Scaladoc
        run: node scripts/style-scaladoc.mjs website/build/api

      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
