name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: mill-${{ runner.os }}-${{ hashFiles('.mill-version', 'build.mill', '**/package.mill') }}
          restore-keys: mill-${{ runner.os }}-
      - name: Reflection discipline check
        run: |
          # runtime reflection is forbidden everywhere (native-image); tui-macros uses compile-time Mirror only
          if grep -rn "java\.lang\.reflect\|Class\.forName" --include="*.scala" */src/main/scala 2>/dev/null; then
            echo "runtime reflection found in main sources" >&2
            exit 1
          fi
      - name: CharWidth discipline check
        run: |
          # String.substring for layout math must go through CharWidth
          violations=$(grep -rn "\.substring(" --include="*.scala" */src/main/scala | grep -v "core/CharWidth.scala" || true)
          if [ -n "$violations" ]; then
            echo "$violations" >&2
            echo "String.substring outside CharWidth" >&2
            exit 1
          fi
      - name: Formatting check
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources
      - name: Compile
        run: ./mill __.compile
      - name: Test
        run: ./mill __.test

  windows:
    # best-effort visibility into Windows behavior; not yet a gate
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile and test
        run: ./mill __.compile && ./mill __.test

  native-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: mill-native-${{ runner.os }}-${{ hashFiles('.mill-version', 'build.mill', '**/package.mill') }}
          restore-keys: mill-native-${{ runner.os }}-
      - name: Build native images for every example
        run: ./mill examples.hello-world.nativeImage examples.counter.nativeImage examples.todo-list.nativeImage examples.dashboard.nativeImage examples.form-demo.nativeImage examples.showcase.nativeImage
      - name: Run each binary (headless: must detect the missing TTY and exit cleanly)
        run: |
          for ex in hello-world counter todo-list dashboard form-demo showcase; do
            ./out/examples/$ex/nativeImage.dest/native-executable | grep -q "UnsupportedTerminal" || exit 1
          done
