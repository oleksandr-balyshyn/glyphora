name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Reflection discipline check (PLAN.md §12)
        run: |
          # runtime reflection is forbidden everywhere (native-image); tui-macros uses compile-time Mirror only
          if grep -rn "java\.lang\.reflect\|Class\.forName" --include="*.scala" */src/main/scala 2>/dev/null; then
            echo "runtime reflection found in main sources" >&2
            exit 1
          fi
      - name: CharWidth discipline check (SPEC.md §2.4)
        run: |
          # String.length/.substring for layout math must go through CharWidth; the two sanctioned call sites
          # are CharWidth.scala itself and Paragraph's exact-prefix bookkeeping (documented inline)
          violations=$(grep -rn "\.substring(" --include="*.scala" */src/main/scala | grep -v "core/CharWidth.scala" || true)
          if [ -n "$violations" ]; then
            echo "$violations" >&2
            echo "String.substring outside CharWidth" >&2
            exit 1
          fi
      - name: Compile
        run: ./mill __.compile
      - name: Test
        run: ./mill __.test

  native-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build native images for every example
        run: ./mill examples.hello-world.nativeImage examples.counter.nativeImage examples.todo-list.nativeImage examples.dashboard.nativeImage examples.form-demo.nativeImage
      - name: Run each binary (headless: must detect the missing TTY and exit cleanly)
        run: |
          for ex in hello-world counter todo-list dashboard form-demo; do
            ./out/examples/$ex/nativeImage.dest/native-executable | grep -q "UnsupportedTerminal" || exit 1
          done
