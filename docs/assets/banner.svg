<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">glyphora — expressive terminal UIs in Scala 3</title>
  <desc id="desc">A Scala-inspired glyphora logo, Scala code panel, and colorful feature badges for signals, widgets, effects, mouse input, and native binaries.</desc>
  <defs>
    <linearGradient id="canvas" x1="30" y1="20" x2="1170" y2="400" gradientUnits="userSpaceOnUse"><stop stop-color="#111827"/><stop offset=".5" stop-color="#080B14"/><stop offset="1" stop-color="#160B25"/></linearGradient>
