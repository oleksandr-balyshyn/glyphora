    <linearGradient id="scala" x1="70" y1="85" x2="195" y2="245" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7A70"/><stop offset=".48" stop-color="#EF3340"/><stop offset="1" stop-color="#B91C3B"/></linearGradient>
    <linearGradient id="word" x1="245" y1="113" x2="650" y2="206" gradientUnits="userSpaceOnUse"><stop stop-color="#F8FAFC"/><stop offset=".47" stop-color="#67E8F9"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
