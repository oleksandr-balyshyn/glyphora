  <ellipse cx="1060" cy="330" rx="190" ry="100" fill="#8B5CF6" opacity=".12" filter="url(#glow)"/>
  <rect x="18" y="18" width="1164" height="384" rx="23" fill="none" stroke="url(#edge)" stroke-width="2"/>

