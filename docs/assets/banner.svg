<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">glyphora — terminal interfaces for Scala 3</title>
  <desc id="desc">A stylized terminal window showing the glyphora wordmark, a Scala prompt, and colorful terminal widgets.</desc>
  <defs>
    <linearGradient id="frame" x1="80" y1="28" x2="1120" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/><stop offset=".5" stop-color="#818CF8"/><stop offset="1" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="word" x1="258" y1="104" x2="743" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/><stop offset=".52" stop-color="#818CF8"/><stop offset="1" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="fade" x1="600" y1="245" x2="600" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111A2E"/><stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="#070B14"/>
  <ellipse cx="300" cy="48" rx="260" ry="76" fill="#0891B2" opacity=".12" filter="url(#glow)"/>
  <ellipse cx="930" cy="320" rx="290" ry="80" fill="#A855F7" opacity=".12" filter="url(#glow)"/>
  <rect x="38" y="28" width="1124" height="304" rx="22" fill="#0B1120" stroke="url(#frame)" stroke-width="2"/>
  <path d="M38 78H1162" stroke="#243047"/>
  <circle cx="72" cy="53" r="8" fill="#FB7185"/><circle cx="100" cy="53" r="8" fill="#FBBF24"/><circle cx="128" cy="53" r="8" fill="#34D399"/>
  <text x="600" y="59" text-anchor="middle" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">~/projects/glyphora</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700">
    <text x="104" y="181" fill="#34D399" font-size="72">❯</text>
    <text x="174" y="181" fill="url(#word)" font-size="72" letter-spacing="5">glyphora</text>
    <rect x="590" y="120" width="28" height="66" rx="2" fill="#22D3EE"/>
  </g>
  <text x="108" y="222" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">terminal interfaces for Scala 3</text>
  <g transform="translate(760 105)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect width="330" height="112" rx="10" fill="#111A2E" stroke="#26334A"/>
    <text x="18" y="27" fill="#64748B" font-size="13">DEPLOYMENT</text><circle cx="305" cy="22" r="5" fill="#34D399"/>
    <text x="18" y="57" fill="#E2E8F0" font-size="15">native-image</text><text x="242" y="57" fill="#34D399" font-size="15">ready</text>
    <rect x="18" y="73" width="294" height="10" rx="5" fill="#243047"/><rect x="18" y="73" width="246" height="10" rx="5" fill="url(#frame)"/>
    <text x="18" y="101" fill="#64748B" font-size="12">signals  •  widgets  •  effects</text>
  </g>
  <rect x="39" y="252" width="1122" height="79" rx="0 0 21 21" fill="url(#fade)"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
    <text x="108" y="283" fill="#22D3EE">Signal</text><text x="168" y="283" fill="#475569">→</text><text x="192" y="283" fill="#A5B4FC">Element tree</text><text x="300" y="283" fill="#475569">→</text><text x="324" y="283" fill="#E879F9">Buffer</text><text x="385" y="283" fill="#475569">→</text><text x="409" y="283" fill="#34D399">ANSI</text>
    <text x="108" y="309" fill="#64748B">reactive state, rich widgets, smooth effects, zero reflection</text>
    <text x="1090" y="297" text-anchor="end" fill="#F87171">Scala 3</text>
  </g>
</svg>
