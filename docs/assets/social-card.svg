<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">glyphora — Terminal UI, written like Scala</title>
  <desc id="desc">A Scala-inspired glyphora logo beside a bold editorial headline and a reactive terminal code window.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/><stop offset=".48" stop-color="#070910"/><stop offset="1" stop-color="#170A24"/>
    </linearGradient>
    <linearGradient id="word" x1="70" y1="225" x2="660" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5C64"/><stop offset=".52" stop-color="#67E8F9"/><stop offset="1" stop-color="#B8A3FF"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94A3B8" stroke-opacity=".055"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" rx="30" fill="url(#canvas)"/>
  <rect width="1200" height="630" rx="30" fill="url(#grid)"/>
  <circle cx="1090" cy="560" r="230" fill="#8B5CF6" opacity=".09"/>
  <circle cx="80" cy="30" r="210" fill="#EF3340" opacity=".08"/>
  <rect x="20" y="20" width="1160" height="590" rx="22" fill="none" stroke="url(#word)" stroke-width="2"/>

  <g transform="translate(64 58)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect width="58" height="58" rx="15" fill="#0A0E19" stroke="#303B52" stroke-width="2"/>
    <path d="M12 20C21 15 31 18 41 14V23C31 27 21 24 12 29Z" fill="#FF5C64"/>
    <path d="M12 31C21 26 31 29 41 25V34C31 38 21 35 12 40Z" fill="#EF3340"/>
    <path d="M12 42C21 37 31 40 41 36V45C31 49 21 46 12 51Z" fill="#C91F3A"/>
    <rect x="47" y="18" width="5" height="29" rx="2.5" fill="#22D3EE"/><circle cx="49.5" cy="52" r="2.6" fill="#34D399"/>
    <text x="74" y="27" fill="#F5F7FA" font-size="22" font-weight="800">glyphora</text>
    <text x="74" y="48" fill="#708097" font-size="9" font-weight="700" letter-spacing="1.7">SCALA 3 / TERMINAL UI</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" letter-spacing="-3">
    <text x="64" y="235" fill="#F8FAFC" font-size="72">Terminal UI,</text>
    <text x="64" y="315" fill="url(#word)" font-size="72">written like</text>
    <text x="64" y="395" fill="url(#word)" font-size="72">Scala.</text>
  </g>

  <text x="68" y="444" fill="#9EABBD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">reactive state · rich widgets · native binaries</text>

  <g transform="translate(68 492)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="700">
    <g><rect width="112" height="34" rx="4" fill="#261219" stroke="#EF3340" stroke-opacity=".7"/><text x="56" y="22" text-anchor="middle" fill="#FF8D94">40+ WIDGETS</text></g>
    <g transform="translate(122)"><rect width="128" height="34" rx="4" fill="#08272E" stroke="#22D3EE" stroke-opacity=".7"/><text x="64" y="22" text-anchor="middle" fill="#67E8F9">ZERO REFLECT</text></g>
    <g transform="translate(260)"><rect width="106" height="34" rx="4" fill="#102B22" stroke="#34D399" stroke-opacity=".7"/><text x="53" y="22" text-anchor="middle" fill="#6EE7B7">GRAALVM</text></g>
  </g>

  <g transform="translate(650 110)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect width="480" height="414" rx="14" fill="#080C15" stroke="#354158"/>
    <rect width="480" height="44" rx="14" fill="#131A29"/><path d="M0 28H480V44H0Z" fill="#131A29"/>
    <circle cx="22" cy="22" r="5" fill="#FB7185"/><circle cx="41" cy="22" r="5" fill="#FBBF24"/><circle cx="60" cy="22" r="5" fill="#34D399"/>
    <text x="240" y="27" text-anchor="middle" fill="#66758C" font-size="10">Counter.scala</text>

    <g transform="translate(28 78)" font-size="14">
      <text y="0" fill="#C084FC">object</text><text x="57" fill="#F1F5F9">Counter</text><text x="126" fill="#C084FC">extends</text><text x="192" fill="#67E8F9">TuiApp:</text>
      <text y="32" x="16" fill="#C084FC">private val</text><text x="120" y="32" fill="#F1F5F9">count =</text><text x="191" y="32" fill="#67E8F9">Signal</text><text x="246" y="32" fill="#F1F5F9">(0)</text>
      <text y="76" x="16" fill="#C084FC">def</text><text x="50" y="76" fill="#F1F5F9">view(using</text><text x="147" y="76" fill="#67E8F9">ReactiveScope</text><text x="266" y="76" fill="#F1F5F9">) =</text>
      <text y="108" x="32" fill="#34D399">panel</text><text x="79" y="108" fill="#FDE68A">("Counter")</text><text x="174" y="108" fill="#F1F5F9">(</text>
      <text y="140" x="48" fill="#34D399">text</text><text x="87" y="140" fill="#FDE68A">(s"count: ${count.get}")</text>
      <text y="172" x="32" fill="#F1F5F9">).rounded</text>
      <text y="204" x="48" fill="#94A3B8">.onKey</text><text x="109" y="204" fill="#67E8F9">(Key.char('+'))</text><text x="232" y="204" fill="#F1F5F9"> {</text>
      <text y="236" x="64" fill="#F1F5F9">count.update(_ + 1)</text>
      <text y="268" x="48" fill="#F1F5F9">}</text>
    </g>

    <g transform="translate(28 364)">
      <rect width="424" height="24" rx="4" fill="#121A2A"/>
      <rect width="344" height="24" rx="4" fill="url(#word)" opacity=".85"/>
      <text x="12" y="16" fill="#071018" font-size="9" font-weight="800">SIGNAL → ELEMENT → BUFFER → DIFF → ANSI</text>
    </g>
  </g>

  <text x="1134" y="579" text-anchor="end" fill="#66758C" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">io.worxbend / glyphora</text>
</svg>
